name: CI - Test on Push/PR

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cdk

      - name: Run linter
        run: npm run lint
        working-directory: cdk

      - name: Run unit tests
        run: npm run test:unit
        working-directory: cdk

      - name: Run property-based tests
        run: npm run test:property
        working-directory: cdk

      - name: CDK synth (validate templates)
        # DnsStack fail-fasts without domainName/hostedZoneId context (#147).
        # These are throwaway placeholders for template validation only — synth
        # does not contact Route53, so any well-formed values suffice.
        run: npx cdk synth --quiet -c domainName=example.com -c hostedZoneId=Z00000000000000000000
        working-directory: cdk
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCOUNT_ID: '000000000000'

  ui-unit:
    name: UI unit tests (jsdom)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: test/unit-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: test/unit-frontend

      - name: Run frontend unit tests
        run: npm test
        working-directory: test/unit-frontend

  ui-e2e:
    name: UI E2E (Playwright, mocked-local)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Playwright dropped Node 18; this job pins Node 20.
      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: test/e2e/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: test/e2e

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: test/e2e

      - name: Run Playwright E2E tests
        run: npm test
        working-directory: test/e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/e2e/playwright-report/
          retention-days: 7
