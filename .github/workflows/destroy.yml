name: Destroy Dev Stack

on:
  delete:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to destroy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}

jobs:
  destroy:
    runs-on: ubuntu-latest
    # Only destroy dev stacks, never prod
    if: |
      (github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: cdk/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: cdk

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Destroy dev stacks
        run: npx cdk destroy --all --force -c env=dev
        working-directory: cdk

      - name: Confirm destruction
        run: echo "Dev stacks destroyed successfully"
