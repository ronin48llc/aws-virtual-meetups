<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AWS Virtual Meetups — Live virtual meetups hosted by AWS user groups">
  <title>AWS Virtual Meetups</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="#/" class="nav__brand" aria-label="AWS Virtual Meetups Home">
        <span class="nav__brand-icon" aria-hidden="true">☁</span>
        <span>AWS Virtual Meetups</span>
      </a>
      <ul class="nav__links">
        <li><a href="#/" class="nav__link" data-route="/">Events</a></li>
        <li><a href="#/manage" class="nav__link" data-route="/manage">Manage Events</a></li>
      </ul>
      <div class="nav__auth" id="nav-auth">
        <button class="btn btn--primary" onclick="App.showAuthModal('signin')">Sign In</button>
        <button class="btn btn--outline" style="color: white; border-color: rgba(255,255,255,0.3); margin-left: 8px;" onclick="App.showAuthModal('signup')">Sign Up</button>
      </div>
    </div>
  </nav>

  <!-- Main Content (rendered by router) -->
  <main id="app" role="main"></main>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <div class="footer__inner">
      <div class="footer__badge">
        <span class="footer__badge-icon" aria-hidden="true"></span>
        <span>Powered by AWS</span>
      </div>
    </div>
  </footer>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal-overlay" role="dialog" aria-modal="true" aria-label="Authentication">
    <div class="modal" id="auth-modal"></div>
  </div>

  <!--
    External SDK <script> tags are pinned to specific versions and carry
    Subresource Integrity (SRI) hashes. When upgrading any of these, the
    integrity hash MUST be recomputed:
        openssl dgst -sha384 -binary <file> | openssl base64 -A
  -->

  <!-- IVS Web Broadcast SDK -->
  <script src="https://web-broadcast.live-video.net/1.6.0/amazon-ivs-web-broadcast.js"
          integrity="sha384-oj22v/UhkUON3VmdD+QnPt9VbchbM9senoTNR52X53QMEIpvuOhAPvMWCEndijGe"
          crossorigin="anonymous"></script>

  <!-- HLS.js for recording playback -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.6.16/dist/hls.min.js"
          integrity="sha384-5E8B0pTlZZJMabWpC0fyYf6OUpe15jJij34BqBAh4NXoHAlLNOjCPRrwtOXOQFAn"
          crossorigin="anonymous"></script>

  <!-- IVS Chat Messaging SDK loader (dynamic import; assigns window.IVSChat) -->
  <script src="js/vendor-loader.js"></script>

  <!-- Cognito SDK (loaded via CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.15/dist/amazon-cognito-identity.min.js"
          integrity="sha384-tmLe+My/drouBT8LDBDX54/GtvpwceGWUwRKXHJfWra2DlJ/598zVtizduWyMqz5"
          crossorigin="anonymous"></script>

  <!-- Runtime configuration (operators edit frontend/js/config.js post-deploy) -->
  <script src="js/config.js"></script>

  <!-- Application Scripts -->
  <!-- i18n must load first so it's available to all subsequent modules. -->
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/fingerprint.js"></script>
  <script src="js/manage.js"></script>
  <script src="js/live-session.js"></script>
  <script src="js/anonymous-viewer.js"></script>
  <script src="js/playback.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
